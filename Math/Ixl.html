    <style>
        .sekuya-regular {
            font-family: "Sekuya", system-ui;
            font-weight: 400;
            font-style: normal;
        }

        :root {
            /* Palette Variables */
            --primary: #d4d4d4;
            --primary-hover: #ffffff;
            --primary-light: rgba(212, 212, 212, 0.15);
            --text: #f5f5f5;
            --text-muted: #a3a3a3;
            --text-light: #737373;
            --bg: #0a0a0a;
            --bg-secondary: #141414;
            --surface: #1a1a1a;
            --surface-hover: #262626;
            --border: #333333;
            --border-light: #404040;
            --glass: rgba(10, 10, 10, 0.8);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.5), 0 1px 2px -1px rgb(0 0 0 / 0.5);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.7);
            --radius: 12px;
            --radius-lg: 16px;
            --gradient-primary: linear-gradient(135deg, #262626 0%, #0a0a0a 100%);
            --gradient-surface: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: "Sekuya", system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background: rgba(10, 10, 10, 0.85); 
            backdrop-filter: blur(12px);
            color: var(--text);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border-light);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
            display: flex;
            width: 100%;
        }

        .search-container {
            display: flex;
            flex-grow: 1;
            gap: 0.75rem;
            width: 100%;
        }

        #searchBar {
            flex-grow: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text);
            font-family: "Sekuya", system-ui, sans-serif;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #searchBar:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
            transform: translateY(-1px);
        }

        #searchBar::placeholder {
            color: var(--text-muted);
        }

        .header-icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius);
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }

        .header-icon-btn:hover {
            background: var(--surface-hover);
            transform: translateY(-2px);
        }

        .header-icon-btn svg {
            width: 20px;
            height: 20px;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem;
            padding-bottom: 4rem;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .zone-item {
            position: relative;
            background: var(--gradient-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            aspect-ratio: 1; /* Makes the box a perfect square */
            box-shadow: var(--shadow-sm);
            animation: popIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .zone-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .zone-item img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures image fills the square without distortion */
            display: block;
            background: var(--border-light);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item:hover img {
            transform: scale(1.08);
        }

        .zone-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            padding: 1rem;
            text-align: center;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        .zone-item:hover .zone-overlay {
            opacity: 1;
        }

        .zone-overlay h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #e5e5e5;
            transform: translateY(10px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-overlay p {
            margin: 0.2rem 0;
            font-size: 0.8rem;
            color: #b3b3b3;
            transform: translateY(10px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item:hover .zone-overlay h3,
        .zone-item:hover .zone-overlay p {
            transform: translateY(0);
        }

        #zoneViewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        /* Bottom Middle Hidden Controls */
        .floating-controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(15px);
            display: flex;
            gap: 8px;
            z-index: 10000;
            background: rgba(20, 20, 20, 0.7);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .floating-controls::before {
            content: '';
            position: absolute;
            inset: -40px; 
            z-index: -1;
        }

        .floating-controls:hover {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .floating-controls button {
            background: transparent;
            border: none;
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .floating-controls button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .floating-controls button svg {
            width: 20px;
            height: 20px;
        }

        /* Popup Styling */
        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
        }

        .popup {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }

        .popup-header {
            background: var(--gradient-primary);
            color: white;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #popupTitle {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        #popupClose {
            background: rgba(255, 255, 255, 0.1);
            border: 0;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius);
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #popupClose:hover { background: rgba(255, 255, 255, 0.2); transform: scale(1.1); }

        #popupBody {
            padding: 1.5rem;
            overflow-y: auto;
            color: var(--text);
        }

        .settings-button {
            background: var(--gradient-primary);
            color: white;
            border: 0;
            padding: 0.875rem 1.5rem;
            font-family: "Sekuya", system-ui, sans-serif;
            font-size: 15px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        .settings-button:hover { transform: translateY(-2px); }

        @media (max-width: 768px) {
            #container { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>

    <script>
// Force Google Drive Cloak continuously
function enforceGoogleDriveDisguise() {
    if (document.title !== "My Drive - Google Drive") {
        document.title = "My Drive - Google Drive";
    }
    const icons = document.querySelectorAll("link[rel*='icon']");
    icons.forEach(icon => {
        if (icon.href !== "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png") {
            icon.href = "https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png";
        }
    });
}
enforceGoogleDriveDisguise();
setInterval(enforceGoogleDriveDisguise, 1000); 

const container = document.getElementById('container');
const zoneViewer = document.getElementById('zoneViewer');
let zoneFrame = document.getElementById('zoneFrame');
const searchBar = document.getElementById('searchBar');

const zonesurls = [
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@main/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@latest/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets@master/zones.json",
    "https://cdn.jsdelivr.net/gh/freebuisness/assets/zones.json"
];
let zonesURL = zonesurls[Math.floor(Math.random() * zonesurls.length)];
const coverURL = "https://cdn.jsdelivr.net/gh/freebuisness/covers@main";
const htmlURL = "https://cdn.jsdelivr.net/gh/freebuisness/html@main";
let zones = [];
let popularityData = {};

async function listZones() {
    try {
      let sharesponse;
      let shajson;
      let sha;
        try {
          sharesponse = await fetch("https://api.github.com/repos/freebuisness/assets/commits?t="+Date.now());
        } catch (error) {}
        if (sharesponse && sharesponse.status === 200) {
          try {
            shajson = await sharesponse.json();
            sha = shajson[0]['sha'];
            if (sha) {
                zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
            }
          } catch (error) {
            try {
                let secondarysharesponse = await fetch("https://raw.githubusercontent.com/freebuisness/xml/refs/heads/main/sha.txt?t="+Date.now());
                if (secondarysharesponse && secondarysharesponse.status === 200) {
                    sha = (await secondarysharesponse.text()).trim();
                    if (sha) {
                        zonesURL = `https://cdn.jsdelivr.net/gh/freebuisness/assets@${sha}/zones.json`;
                    }
                }
            } catch(error) {}
          }
        }
        const response = await fetch(zonesURL+"?t="+Date.now());
        const json = await response.json();
        zones = json;
        await Promise.all([fetchPopularity("year"), fetchPopularity("month"), fetchPopularity("week"), fetchPopularity("day")]);
        sortZones();
        try {
        const search = new URLSearchParams(window.location.search);
        const id = search.get('id');
        const embed = window.location.hash.includes("embed");
        if (id) {
            const zone = zones.find(zone => zone.id + '' == id + '');
            if (zone) {
                if (embed) {
                    if (zone.url.startsWith("http")) {
                        window.open(zone.url, "_blank");
                    } else {
                        const url = zone.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
                        fetch(url+"?t="+Date.now()).then(response => response.text()).then(html => {
                            document.documentElement.innerHTML = html;
                            const popup = document.createElement("div");
                            popup.style.position = "fixed";
                            popup.style.bottom = "20px";
                            popup.style.right = "20px";
                            popup.style.backgroundColor = "#262626";
                            popup.style.color = "#ffffff";
                            popup.style.padding = "10px";
                            popup.style.border = "1px solid #404040";
                            popup.style.borderRadius = "5px";
                            popup.style.boxShadow = "0px 0px 10px rgba(0,0,0,0.5)";
                            popup.style.fontFamily = "Arial, sans-serif";
                            
                            popup.innerHTML = `Play more games at <a href="https://gn-math.dev" target="_blank" style="color:#d4d4d4; font-weight:bold;">https://gn-math.dev</a>!`;
                            
                            const closeBtn = document.createElement("button");
                            closeBtn.innerText = "?";
                            closeBtn.style.marginLeft = "10px";
                            closeBtn.style.background = "none";
                            closeBtn.style.border = "none";
                            closeBtn.style.cursor = "pointer";
                            closeBtn.style.color = "#ffffff";
                            closeBtn.style.fontWeight = "bold";
                            
                            closeBtn.onclick = () => popup.remove();
                            popup.appendChild(closeBtn);
                            document.documentElement.querySelectorAll('script').forEach(oldScript => {
                                const newScript = document.createElement('script');
                                if (oldScript.src) {
                                    newScript.src = oldScript.src;
                                } else {
                                    newScript.textContent = oldScript.textContent;
                                }
                                document.body.appendChild(newScript);
                            });
                        }).catch(error => alert("Failed to load zone: " + error));
                    }
                } else {
                    openZone(zone);
                }
            }
        }
        } catch(error){}
    } catch (error) {
        console.error(error);
        container.innerHTML = `Error loading zones: ${error}`;
    }
}
async function fetchPopularity(duration) {
    try {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        const response = await fetch(
            "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration
        );
        const data = await response.json();
        data.forEach(file => {
            const idMatch = file.name.match(/\/(\d+)\.html$/);
            if (idMatch) {
                const id = parseInt(idMatch[1]);
                popularityData[duration][id] = file.hits?.total ?? 0;
            }
        });
    } catch (error) {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        popularityData[duration][0] = 0;
    }
}

function sortZones() {
    zones.sort((a, b) => a.id - b.id);
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    displayZones(zones);
}

function displayZones(zones) {
    container.innerHTML = "";
    zones.forEach((file, index) => {
        const zoneItem = document.createElement("div");
        zoneItem.className = "zone-item";
        zoneItem.style.animationDelay = `${(index % 30) * 0.05}s`;
        zoneItem.onclick = () => openZone(file);
        
        const img = document.createElement("img");
        img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
        img.alt = file.name;
        img.loading = "lazy";
        img.className = "lazy-zone-img";
        zoneItem.appendChild(img);
        
        const overlay = document.createElement("div");
        overlay.className = "zone-overlay";
        
        const title = document.createElement("h3");
        title.textContent = file.name;
        overlay.appendChild(title);

        if (file.author) {
            const author = document.createElement("p");
            author.textContent = "By: " + file.author;
            overlay.appendChild(author);
        }

        if (file.special && file.special.length > 0) {
            const tags = document.createElement("p");
            tags.textContent = Array.isArray(file.special) ? file.special.join(", ") : file.special;
            overlay.appendChild(tags);
        }

        zoneItem.appendChild(overlay);
        container.appendChild(zoneItem);   
    });
    if (container.innerHTML === "") {
        container.innerHTML = "No zones found.";
    }

    const lazyImages = document.querySelectorAll('img.lazy-zone-img');
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !zoneViewer.hidden) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove("lazy-zone-img");
                observer.unobserve(img);
            }
        });
    }, {
        rootMargin: "100px", 
        threshold: 0.1
    });

    lazyImages.forEach(img => {
        imageObserver.observe(img);
    });
}

function filterZones() {
    const query = searchBar.value.toLowerCase();
    const filteredZones = zones.filter(zone => zone.name.toLowerCase().includes(query));
    displayZones(filteredZones);
}

function openZone(file) {
    if (file.url.startsWith("http")) {
        window.open(file.url, "_blank");
    } else {
        const url = file.url.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
        fetch(url+"?t="+Date.now()).then(response => response.text()).then(html => {
            if (zoneFrame.contentDocument === null) {
                zoneFrame = document.createElement("iframe");
                zoneFrame.id = "zoneFrame";
                zoneFrame.style.width = "100%";
                zoneFrame.style.height = "100%";
                zoneFrame.style.border = "none";
                zoneViewer.appendChild(zoneFrame);
            }
            zoneFrame.contentDocument.open();
            zoneFrame.contentDocument.write(html);
            zoneFrame.contentDocument.close();
            document.getElementById('zoneId').textContent = file.id;
            zoneViewer.style.display = "flex"; // Show viewer inside tab
            try {
                const url = new URL(window.location);
                url.searchParams.set('id', file.id);
                history.pushState(null, '', url.toString());
            } catch(error){}
            zoneViewer.hidden = false;
        }).catch(error => alert("Failed to load zone: " + error));
    }
}

function reloadZone() {
    const id = document.getElementById('zoneId').textContent;
    const zone = zones.find(z => z.id + '' === id);
    if (zone) openZone(zone);
}

function closeZone() {
    zoneViewer.hidden = true;
    zoneViewer.style.display = "none";
    zoneViewer.removeChild(zoneFrame);
    try {
        const url = new URL(window.location);
        url.searchParams.delete('id');
        history.pushState(null, '', url.toString());
    } catch(error){}
}

function downloadZone() {
    let zone = zones.find(zone => zone.id + '' === document.getElementById('zoneId').textContent);
    fetch(zone.url.replace("{HTML_URL}", htmlURL)+"?t="+Date.now()).then(res => res.text()).then(text => {
        const blob = new Blob([text], {
            type: "text/plain;charset=utf-8"
        });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = zone.name + ".html";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    });
}

function showSettings() {
    document.getElementById('popupTitle').textContent = "Settings";
    const popupBody = document.getElementById('popupBody');
    popupBody.innerHTML = `
        <div style="display: flex; flex-direction: column; gap: 1rem; padding: 1rem 0;">
            <button class="settings-button" onclick="saveData()">Export Save Data</button>
            <button class="settings-button" onclick="document.getElementById('importData').click()">Import Save Data</button>
        </div>
    `;
    popupBody.contentEditable = false;
    document.getElementById('popupOverlay').style.display = "flex";
}

function closePopup() {
    document.getElementById('popupOverlay').style.display = "none";
}
listZones();

HTMLCanvasElement.prototype.toDataURL = function (...args) {
    return "";
};
</script>
