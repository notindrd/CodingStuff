    <style>
        :root {
            /* Light Mode Monochrome Palette */
            --primary: #404040;
            --primary-hover: #1a1a1a;
            --primary-light: rgba(64, 64, 64, 0.15);
            --primary-lighter: rgba(64, 64, 64, 0.05);
            --accent: #737373;
            --accent-light: rgba(115, 115, 115, 0.1);
            --success: #10b981;
            --warning: #f59e0b;
            --text: #111111;
            --text-muted: #6b7280;
            --text-light: #9ca3af;
            --bg: #ffffff;
            --bg-secondary: #f4f4f5;
            --surface: #ffffff;
            --surface-hover: #f4f4f5;
            --border: #e5e5e5;
            --border-light: #f4f4f5;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --shadow-glow: 0 0 20px rgba(64, 64, 64, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --gradient-primary: linear-gradient(135deg, #404040 0%, #1a1a1a 100%);
            --gradient-accent: linear-gradient(135deg, #737373 0%, #404040 100%);
            --gradient-surface: linear-gradient(135deg, #ffffff 0%, #f4f4f5 100%);
        }

        .dark-mode {
            /* Dark Mode Monochrome Palette */
            --primary: #d4d4d4;
            --primary-hover: #ffffff;
            --primary-light: rgba(212, 212, 212, 0.15);
            --primary-lighter: rgba(212, 212, 212, 0.08);
            --accent: #a3a3a3;
            --accent-light: rgba(163, 163, 163, 0.15);
            --success: #34d399;
            --warning: #fbbf24;
            --text: #f5f5f5;
            --text-muted: #a3a3a3;
            --text-light: #737373;
            --bg: #0a0a0a;
            --bg-secondary: #141414;
            --surface: #1a1a1a;
            --surface-hover: #262626;
            --border: #333333;
            --border-light: #404040;
            --glass: rgba(10, 10, 10, 0.8);
            --shadow-xs: 0 1px 2px 0 rgb(0 0 0 / 0.4);
            --shadow-sm: 0 1px 3px 0 rgb(0 0 0 / 0.5), 0 1px 2px -1px rgb(0 0 0 / 0.5);
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.6);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.7), 0 8px 10px -6px rgb(0 0 0 / 0.7);
            --shadow-glow: 0 0 20px rgba(255, 255, 255, 0.05);
            --gradient-primary: linear-gradient(135deg, #262626 0%, #0a0a0a 100%);
            --gradient-accent: linear-gradient(135deg, #525252 0%, #262626 100%);
            --gradient-surface: linear-gradient(135deg, #1a1a1a 0%, #262626 100%);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            background: var(--bg); /* Blends perfectly with the page background */
            color: var(--text);
            position: sticky;
            top: 0;
            z-index: 100;
            padding-bottom: 0.5rem;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .logo {
            font-size: 1.75rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff 0%, rgba(255, 255, 255, 0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .search-container {
            display: flex;
            flex: 1;
            gap: 0.75rem;
        }

        #searchBar {
            flex: 1;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: transparent;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 40px;
        }

        #searchBar:focus {
            background: transparent;
            border-color: var(--text-light);
            box-shadow: 0 0 0 1px var(--text-light);
            transform: translateY(-1px);
            color: var(--text);
        }

        #searchBar::placeholder {
            color: var(--text-muted);
        }

        #sortOptions {
            padding: 0.875rem 1rem;
            border: 0;
            border-radius: var(--radius);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 130px;
            box-shadow: var(--shadow-sm);
        }

        #sortOptions:hover {
            background: var(--text);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            color: var(--bg);
        }

        #filterOptions {
            padding: 0.875rem 1rem;
            border: 0;
            border-radius: var(--radius);
            background: var(--glass);
            backdrop-filter: blur(20px);
            color: var(--text-muted);
            font-size: 15px;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 130px;
            box-shadow: var(--shadow-sm);
        }

        #filterOptions:hover {
            background: var(--text);
            transform: translateY(-1px);
            box-shadow: var(--shadow);
            color: var(--bg);
        }

        main {
            margin: 0 auto;
            padding: 1rem;
            padding-bottom: 2rem;
        }

        #zoneCount {
            margin: 0 0 1.5rem;
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #zoneCount::before {
            content: '';
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1.5rem;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .zone-item {
            background: var(--gradient-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: var(--shadow-sm);
            animation: popIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) backwards;
        }

        .zone-item:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: var(--shadow-xl);
            border-color: var(--primary);
        }

        .zone-item:hover::before {
            opacity: 1;
        }

        .zone-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--primary-light);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            z-index: 1;
        }

        .zone-item img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            display: block;
            background: var(--border-light);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item:hover img {
            transform: scale(1.05);
        }

        .zone-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            color: white;
            padding: 1rem;
            text-align: center;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        .zone-item:hover .zone-overlay {
            opacity: 1;
        }

        .zone-overlay h3 {
            margin: 0 0 0.5rem 0;
            font-size: 1.1rem;
            font-weight: bold;
            color: #e5e5e5;
            transform: translateY(10px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-overlay p {
            margin: 0.2rem 0;
            font-size: 0.8rem;
            color: #b3b3b3;
            transform: translateY(10px);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .zone-item:hover .zone-overlay h3,
        .zone-item:hover .zone-overlay p {
            transform: translateY(0);
        }

        #zoneViewer {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: none;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
            animation: slideInUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Bottom Middle Hidden Controls */
        .floating-controls {
            position: absolute;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(15px);
            display: flex;
            gap: 8px;
            z-index: 10000;
            background: rgba(20, 20, 20, 0.7);
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Invisible expanded hover buffer */
        .floating-controls::before {
            content: '';
            position: absolute;
            inset: -40px; 
            z-index: -1;
        }

        .floating-controls:hover {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .floating-controls button {
            background: transparent;
            border: none;
            color: white;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .floating-controls button:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.1);
        }

        .floating-controls button svg {
            width: 20px;
            height: 20px;
        }

        #popupOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 1rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .popup {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 520px;
            max-height: 80vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            animation: slideInScale 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideInScale {
            from {
                transform: scale(0.9) translateY(20px);
                opacity: 0;
            }
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .popup-header {
            background: var(--gradient-primary);
            color: white;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #popupTitle {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 700;
        }

        #popupClose {
            background: rgba(255, 255, 255, 0.1);
            border: 0;
            color: white;
            font-size: 1.25rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: var(--radius);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            line-height: 1;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(20px);
        }

        #popupClose:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        #popupBody {
            padding: 1.5rem;
            overflow-y: auto;
            color: var(--text);
        }

        #popupBody input[type="text"],
        #popupBody input[type="file"] {
            width: 100%;
            padding: 0.875rem 1rem;
            margin-bottom: 1.25rem;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-secondary);
            color: var(--text);
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            outline: none;
        }

        #popupBody input[type="text"]:focus,
        #popupBody input[type="file"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }

            .search-container {
                width: 100%;
            }

            main {
                padding: 1.5rem 1rem;
            }

            #container {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 1.25rem;
            }

            .zone-item button {
                padding: 1rem 0.75rem;
                min-height: 65px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            #container {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
                gap: 1rem;
            }

            .popup {
                margin: 0.5rem;
            }

            .zone-item:hover {
                transform: translateY(-10px) scale(1.01);
            }

        }

        .settings-button {
            background: var(--gradient-primary);
            color: white;
            border: 0;
            padding: 0.875rem 1.5rem;
            font-size: 15px;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-sm);
            min-width: 200px;
            width: 100%;
            text-align: center;
        }

        .settings-button:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .settings-button:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        .info-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            margin-left: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            transition: background-color 0.2s, transform 0.2s;
            color: inherit;
            vertical-align: middle;
        }

        .info-button:hover {
            background-color: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .info-button:active {
            transform: scale(0.95);
        }

        .info-button svg {
            display: block;
        }

        .header-icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: var(--radius);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            flex-shrink: 0;
        }

        .header-icon-btn:hover {
            background: var(--surface-hover);
            color: var(--text);
            transform: translateY(-2px);
        }

        .header-icon-btn svg {
            width: 20px;
            height: 20px;
        }
    </style>

async function fetchPopularity(duration) {
    try {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        const response = await fetch(
            "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files?period=" + duration
        );
        const data = await response.json();
        data.forEach(file => {
            const idMatch = file.name.match(/\/(\d+)\.html$/);
            if (idMatch) {
                const id = parseInt(idMatch[1]);
                popularityData[duration][id] = file.hits?.total ?? 0;
            }
        });
    } catch (error) {
        if (!popularityData[duration]) {
            popularityData[duration] = {};
        }
        popularityData[duration][0] = 0;
    }
}

function sortZones() {
    // Default sort by ID (Date)
    zones.sort((a, b) => a.id - b.id);
    zones.sort((a, b) => (a.id === -1 ? -1 : b.id === -1 ? 1 : 0));
    displayZones(zones);
}

function displayZones(zones) {
    container.innerHTML = "";
    zones.forEach((file, index) => {
        const zoneItem = document.createElement("div");
        zoneItem.className = "zone-item";
        zoneItem.style.animationDelay = `${(index % 30) * 0.05}s`;
        zoneItem.onclick = () => openZone(file);
        const img = document.createElement("img");
        img.dataset.src = file.cover.replace("{COVER_URL}", coverURL).replace("{HTML_URL}", htmlURL);
        img.alt = file.name;
        img.loading = "lazy";
        img.className = "lazy-zone-img";
        zoneItem.appendChild(img);
        
        const overlay = document.createElement("div");
        overlay.className = "zone-overlay";
        
        const title = document.createElement("h3");
        title.textContent = file.name;
        overlay.appendChild(title);

        if (file.author) {
            const author = document.createElement("p");
            author.textContent = "By: " + file.author;
            overlay.appendChild(author);
        }

        if (file.special && file.special.length > 0) {
            const tags = document.createElement("p");
            tags.textContent = Array.isArray(file.special) ? file.special.join(", ") : file.special;
            overlay.appendChild(tags);
        }

        zoneItem.appendChild(overlay);
        container.appendChild(zoneItem);   
    });
    if (container.innerHTML === "") {
        container.innerHTML = "No zones found.";
    }

    const lazyImages = document.querySelectorAll('img.lazy-zone-img');
    const imageObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !zoneViewer.hidden) {
                const img = entry.target;
                img.src = img.dataset.src;
                img.classList.remove("lazy-zone-img");
                observer.unobserve(img);
            }
        });
    }, {
        rootMargin: "100px", 
        threshold: 0.1
    });

    lazyImages.forEach(img => {
        imageObserver.observe(img);
    });
}

function sanitizeData(obj, maxStringLen = 1000, maxArrayLen = 10000) {
    if (typeof obj === 'string') {
      return obj.length > maxStringLen ? obj.slice(0, maxStringLen) + '...[truncated]' : obj;
    }
    
    if (obj instanceof Uint8Array) {
      if (obj.length > maxArrayLen) {
        return `[Uint8Array too large (${obj.length} bytes), truncated]`;
      }
      return obj;
    }
    
    if (Array.isArray(obj)) {
      return obj.map(item => sanitizeData(item, maxStringLen, maxArrayLen));
    }
    
    if (obj && typeof obj === 'object') {
      const newObj = {};
      for (const key in obj) {
        if (obj.hasOwnProperty(key)) {
          newObj[key] = sanitizeData(obj[key], maxStringLen, maxArrayLen);
        }
      }
      return newObj;
    }
    
    return obj;
  }

async function saveData() {
    alert("This might take a while, dont touch anything other than this OK button");
    const result = {};
    result.cookies = document.cookie;
    result.localStorage = {...localStorage};
    result.sessionStorage = {...sessionStorage};
    result.indexedDB = {};
    const dbs = await indexedDB.databases();
    for (const dbInfo of dbs) {
      if (!dbInfo.name) continue;
      result.indexedDB[dbInfo.name] = {};
      await new Promise((resolve, reject) => {
        const openRequest = indexedDB.open(dbInfo.name, dbInfo.version);
        openRequest.onerror = () => reject(openRequest.error);
        openRequest.onsuccess = () => {
          const db = openRequest.result;
          const storeNames = Array.from(db.objectStoreNames);
          if (storeNames.length === 0) {
            resolve();
            return;
          }
          const transaction = db.transaction(storeNames, "readonly");
          const storePromises = [];
          for (const storeName of storeNames) {
            result.indexedDB[dbInfo.name][storeName] = [];
            const store = transaction.objectStore(storeName);
            const getAllRequest = store.getAll();
            const p = new Promise((res, rej) => {
              getAllRequest.onsuccess = () => {
                result.indexedDB[dbInfo.name][storeName] = sanitizeData(getAllRequest.result, 1000, 100);
                res();
              };
              getAllRequest.onerror = () => rej(getAllRequest.error);
            });
            storePromises.push(p);
          }
          Promise.all(storePromises).then(() => resolve());
        };
      });
    }

    result.caches = {};
    const cacheNames = await caches.keys();
    for (const cacheName of cacheNames) {
      const cache = await caches.open(cacheName);
      const requests = await cache.keys();
      result.caches[cacheName] = [];
      for (const req of requests) {
        const response = await cache.match(req);
        if (!response) continue;
        const cloned = response.clone();
        const contentType = cloned.headers.get('content-type') || '';
        let body;
        try {
          if (contentType.includes('application/json')) {
            body = await cloned.json();
          } else if (contentType.includes('text') || contentType.includes('javascript')) {
            body = await cloned.text();
          } else {
            const buffer = await cloned.arrayBuffer();
            body = btoa(String.fromCharCode(...new Uint8Array(buffer)));
          }
        } catch (e) {
          body = '[Unable to read body]';
        }
        result.caches[cacheName].push({
          url: req.url,
          body,
          contentType
        });
      }
    }
  
    alert("Done, wait for the download to come");
    const link = document.createElement("a");
    link.href = URL.createObjectURL(new Blob([JSON.stringify(result)], {
        type: "application/octet-stream"
    }));
    link.download = `${Date.now()}.data`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }
  
  async function loadData(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function (e) {
        const data = JSON.parse(e.target.result);
        if (data.cookies) {
            data.cookies.split(';').forEach(cookie => {
              document.cookie = cookie.trim();
            });
          }
        
          if (data.localStorage) {
            for (const key in data.localStorage) {
              localStorage.setItem(key, data.localStorage[key]);
            }
          }
        
          if (data.sessionStorage) {
            for (const key in data.sessionStorage) {
              sessionStorage.setItem(key, data.sessionStorage[key]);
            }
          }
        
          if (data.indexedDB) {
            for (const dbName in data.indexedDB) {
              const stores = data.indexedDB[dbName];
              await new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                request.onupgradeneeded = e => {
                  const db = e.target.result;
                  for (const storeName in stores) {
                    if (!db.objectStoreNames.contains(storeName)) {
                      db.createObjectStore(storeName, { keyPath: 'id', autoIncrement: true });
                    }
                  }
                };
                request.onsuccess = e => {
                  const db = e.target.result;
                  const transaction = db.transaction(Object.keys(stores), 'readwrite');
                  transaction.onerror = () => reject(transaction.error);
                  let pendingStores = Object.keys(stores).length;
        
                  for (const storeName in stores) {
                    const objectStore = transaction.objectStore(storeName);
                    objectStore.clear().onsuccess = () => {
                      for (const item of stores[storeName]) {
                        objectStore.put(item);
                      }
                      pendingStores--;
                      if (pendingStores === 0) resolve();
                    };
                  }
                };
                request.onerror = () => reject(request.error);
              });
            }
          }
        
          if (data.caches) {
            for (const cacheName in data.caches) {
              const cache = await caches.open(cacheName);
              await cache.keys().then(keys => Promise.all(keys.map(k => cache.delete(k)))); // clear existing
        
              for (const entry of data.caches[cacheName]) {
                let responseBody;
                if (entry.contentType.includes('application/json')) {
                  responseBody = JSON.stringify(entry.body);
                } else if (entry.contentType.includes('text') || entry.contentType.includes('javascript')) {
                  responseBody = entry.body;
                } else {
                  const binaryStr = atob(entry.body);
                  const len = binaryStr.length;
                  const bytes = new Uint8Array(len);
                  for (let i = 0; i < len; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                  }
                  responseBody = bytes.buffer;
                }
                const headers = new Headers({ 'content-type': entry.contentType });
                const response = new Response(responseBody, { headers });
                await cache.put(entry.url, response);
              }
            }
          }
        alert("Data loaded");
    };
    alert("This might take a while, dont touch anything other than this OK button");
    reader.readAsText(file);
  }

let _allStatsCache = null;

async function getAllStats() {
  if (_allStatsCache) {
    return _allStatsCache;
  }

  const BASE_URL =
    "https://data.jsdelivr.com/v1/stats/packages/gh/freebuisness/html@main/files";
  const PERIOD = "year";
  const PAGE_BATCH = 5;

  let page = 1;
  let done = false;
  const combinedMap = Object.create(null);

  while (!done) {
    const pages = Array.from({ length: PAGE_BATCH }, (_, i) => page + i);

    const responses = await Promise.all(
      pages.map(p =>
        fetch(`${BASE_URL}?period=${PERIOD}&page=${p}&limit=100`)
          .then(r => (r.ok ? r.json() : []))
      )
    );

    for (const data of responses) {
      if (!Array.isArray(data) || data.length === 0) {
        done = true;
        break;
      }

      for (const item of data) {
        if (!item?.name) continue;

        const match = item.name.match(/^\/(\d+)([.-])/);
        if (!match) continue;

        const id = match[1];

        if (!combinedMap[id]) {
          combinedMap[id] = {
            hits: 0,
            bandwidth: 0
          };
        }

        combinedMap[id].hits += item.hits?.total ?? 0;
        combinedMap[id].bandwidth += item.bandwidth?.total ?? 0;
      }
    }

    page += PAGE_BATCH;
  }

  _allStatsCache = combinedMap;
  return combinedMap;
}

async function getStats(id) {
  id = String(id);
  const allStats = await getAllStats();

  return allStats[id]?.hits ?? 0;
}
